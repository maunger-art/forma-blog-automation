name: Generate and publish posts

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday    06:00 UTC
    - cron: '0 6 * * 3'   # Wednesday 06:00 UTC
    - cron: '0 6 * * 5'   # Friday    06:00 UTC
    - cron: '0 6 * * 6'   # Saturday  06:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r research/requirements.txt
      - name: Generate post
        run: python3 content_generator.py --batch 1 --rebuild
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit new post
        run: |
          git config user.email "actions@github.com"
          git config user.name "Forma Bot"
          git add posts_manifest.json shared/queue.json
          git diff --staged --quiet || git commit -m "content: auto-generated post $(date +%Y-%m-%d)"
          git push

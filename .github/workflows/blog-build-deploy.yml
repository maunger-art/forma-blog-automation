name: Build and Deploy Forma Blog

on:
  push:
    branches: [main]
    paths:
      - 'forma_blog_posts.md'
      - 'posts_manifest.json'
      - 'forma_blog_build.py'
      - 'forma_fonts.css'
      - 'requirements.txt'
      - 'sync_blog_sources.py'
      - '.github/workflows/blog-build-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync blog sources
        run: |
          if [ -f sync_blog_sources.py ]; then
            echo "🔄 Syncing posts_manifest.json ↔ forma_blog_posts.md..."
            python sync_blog_sources.py
          else
            echo "ℹ️  sync_blog_sources.py not found — skipping sync step"
          fi

      - name: Build blog
        run: |
          echo "🔨 Starting blog build..."
          python forma_blog_build.py
          echo "📄 Post count: $(python3 -c "import json; d=json.load(open('posts_manifest.json')); print(len([p for p in d if p.get('body_html')]))")"

      - name: Prepare _site directory
        run: |
          mkdir -p _site
          cp -R output/* _site/
          touch _site/.nojekyll
          echo "✅ _site ready — $(find _site -name '*.html' | wc -l) HTML files"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Build and Deploy Forma Blog

on:
  push:
    branches:
      - main
    paths:
      - 'forma_blog_posts.md'
      - 'forma_blog_build.py'
      - 'requirements.txt'
      - 'forma_fonts.css'
      - 'posts_manifest.json'
      - '.github/workflows/blog-build-deploy.yml'

  workflow_dispatch:

  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Generate weekly post (scheduled only)
        if: github.event_name == 'schedule'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_weekly_post.py

      - name: Commit generated post
        if: github.event_name == 'schedule'
        run: |
          if [ ! -f .post_generated ]; then
            echo "No post generated — queue empty."
            echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
            exit 0
          fi
          TITLE=$(cat .post_generated)
          rm -f .post_generated
          git config user.name  "Forma Blog Bot"
          git config user.email "bot@formafit.co.uk"
          git add forma_blog_posts.md blog_topic_queue.txt
          git commit -m "auto: add weekly post — ${TITLE} [skip ci]" || echo "Nothing to commit"
          git push

      - name: Skip if queue was empty
        if: env.SKIP_DEPLOY == 'true'
        run: |
          echo "Queue empty — skipping build and deploy."
          exit 0

      - name: Run blog build script
        if: env.SKIP_DEPLOY != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python forma_blog_build.py

      - name: Prepare Pages output
        if: env.SKIP_DEPLOY != 'true'
        run: |
          mkdir -p _site
          cp -R output/* _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: env.SKIP_DEPLOY != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: env.SKIP_DEPLOY != 'true'
        uses: actions/deploy-pages@v4

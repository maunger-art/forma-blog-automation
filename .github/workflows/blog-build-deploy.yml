name: Build and Deploy Forma Blog

on:
  push:
    branches:
      - main
    paths:
      - 'forma_blog_posts.md'
      - 'forma_blog_build.py'
      - 'requirements.txt'
      - 'blog.html'
      - 'forma_fonts.css'
      - 'posts_manifest.json'
      - '.github/workflows/blog-build-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          pip install -r requirements.txt

      - name: Run blog build script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python forma_blog_build.py

      - name: Prepare Pages output
        run: |
          mkdir -p _site
          cp -R output/* _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

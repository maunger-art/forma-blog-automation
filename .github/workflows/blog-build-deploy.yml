name: Build and Deploy Forma Blog

on:
  push:
    branches:
      - main
    paths:
      # Trigger on any content or config change
      - 'forma_blog_posts.md'
      - 'forma_blog_build.py'
      - 'requirements.txt'
      - 'forma_fonts.css'
      - 'posts_manifest.json'
      - '.github/workflows/blog-build-deploy.yml'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build blog and deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest repo state
        uses: actions/checkout@v4
        with:
          # Always build from the very latest commit on main,
          # including posts committed by the generate workflow
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build blog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "▶ Starting build..."
          python forma_blog_build.py
          echo "▶ Build complete."

      - name: Prepare GitHub Pages output
        run: |
          mkdir -p _site
          cp -R output/* _site/
          touch _site/.nojekyll
          echo "▶ Pages output ready — $(ls _site | wc -l) files"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

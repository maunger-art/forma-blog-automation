name: Weekly Athlete Question Harvest
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to run (all|reddit|autosuggest|paa|competitor)'
        default: 'all'
      skip_cache:
        description: 'Force fresh fetch'
        type: boolean
        default: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip }
      - run: pip install -r research/requirements.txt
      - uses: actions/cache@v4
        with:
          path: research/cache
          key: aqe-cache-${{ hashFiles('research/config/sources.json') }}
          restore-keys: aqe-cache-
      - name: Debug Arctic Shift API
        run: |
          python3 -c "
          import requests, time, json
          from urllib.parse import quote
          term = 'zone 2 training'
          sub = 'running'
          one_year_ago = int(time.time()) - (365 * 24 * 60 * 60)
          url = f'https://arctic-shift.photon-reddit.com/api/submissions/search?q={quote(term)}&subreddit={sub}&limit=5&sort=top&after={one_year_ago}'
          print('URL:', url)
          resp = requests.get(url, timeout=15)
          print('Status:', resp.status_code)
          data = resp.json()
          print('Keys:', list(data.keys()))
          posts = data.get('data', [])
          print('Posts count:', len(posts))
          if posts:
              print('First title:', posts[0].get('title',''))
              print('Score field:', [k for k in posts[0].keys() if 'score' in k.lower() or 'ups' in k.lower()])
          else:
              print('Full response:', json.dumps(data)[:300])
          "
      - run: python -m research.question_collector
        env:
          AQE_SOURCES: ${{ github.event.inputs.sources || 'all' }}
      - run: python -m research.dedup_engine
      - run: python -m research.question_scorer
      - run: python -m research.cluster_builder
      - run: python -m research.queue_generator
      - run: |
          git config user.email 'ci@formafit.co.uk'
          git config user.name 'Forma AQE'
          git add research/data/ shared/queue.json
          git diff --staged --quiet && echo 'No changes' || \
            git commit -m 'chore(aqe): weekly harvest'
          git push
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: harvest-report-${{ github.run_id }}
          path: research/data/harvest_report.json

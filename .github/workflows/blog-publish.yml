name: Generate and Publish New Blog Post

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 08:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}   # PAT required so push triggers build workflow

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-slugify markdown

      - name: Generate weekly post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python generate_weekly_post.py
          if [ -f .post_generated ]; then
            TITLE=$(cat .post_generated)
            echo "generated=true" >> $GITHUB_OUTPUT
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            rm -f .post_generated
            echo "✅ Post generated: $TITLE"
          else
            echo "generated=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No post generated (queue empty or error)"
          fi

      - name: Commit and push updated files
        if: steps.generate.outputs.generated == 'true'
        run: |
          git config user.name "Forma Blog Bot"
          git config user.email "bot@formafit.co.uk"
          git add forma_blog_posts.md blog_topic_queue.txt posts_manifest.json
          git status
          git commit -m "auto: add post — ${{ steps.generate.outputs.title }}"
          git push
          echo "✅ Committed and pushed — build workflow will trigger automatically"
